<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner de Estudos - ADM 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-dark: #7d3c4c;
            --pink-primary: #d47a90;
            --pink-medium: #e59ca8;
            --pink-light: #faedf0;
            --pink-soft: #fff6f7;
            --pink-accent: #f8ccd4;
            --text-color: #4a3438;
            --text-muted: #8c7377;
            --white: #ffffff;
            --success: #a0c49d;
            --success-dark: #729c6e;
            --shadow: 0 4px 15px rgba(212, 122, 144, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--pink-soft);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 320px;
            background-color: var(--white);
            border-right: 2px solid var(--pink-light);
            display: flex;
            flex-direction: column;
            padding: 24px;
            height: 100%;
            flex-shrink: 0;
            z-index: 10;
        }

        .logo-area {
            text-align: center;
            padding-bottom: 24px;
            border-bottom: 2px dashed var(--pink-accent);
            margin-bottom: 24px;
        }

        .logo-area h1 {
            font-size: 1.5rem;
            color: var(--pink-dark);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .logo-area p {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .add-subject-form {
            margin-bottom: 24px;
        }

        .add-subject-form label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--pink-dark);
            margin-bottom: 8px;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        input[type="text"], textarea, input[type="file"] {
            border: 2px solid var(--pink-light);
            border-radius: 12px;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-color);
            background-color: var(--pink-soft);
            outline: none;
            transition: var(--transition);
            width: 100%;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--pink-primary);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(212, 122, 144, 0.15);
        }

        .btn {
            background-color: var(--pink-primary);
            color: var(--white);
            border: none;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn:hover {
            background-color: var(--pink-dark);
            transform: translateY(-1px);
        }

        .btn-icon-only {
            width: 48px;
            height: 48px;
            padding: 0;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .subjects-list-container {
            flex-grow: 1;
            overflow-y: auto;
            margin-right: -8px;
            padding-right: 8px;
        }

        .subjects-list-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 700;
        }

        .subject-item {
            background-color: var(--pink-soft);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
        }

        .subject-item:hover {
            background-color: var(--white);
            border-color: var(--pink-accent);
            transform: translateX(4px);
        }

        .subject-item.active {
            background-color: var(--pink-light);
            border-color: var(--pink-primary);
        }

        .subject-item-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--pink-dark);
            padding-right: 24px;
            word-break: break-word;
        }

        .subject-item-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-delete-subject {
            position: absolute;
            top: 14px;
            right: 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .btn-delete-subject:hover {
            background-color: var(--pink-accent);
            color: var(--pink-dark);
        }

        /* Main Content Styling */
        .main-content {
            flex-grow: 1;
            padding: 32px;
            overflow-y: auto;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Welcome Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .welcome-screen h2 {
            font-size: 2rem;
            color: var(--pink-dark);
            margin-bottom: 12px;
        }

        .welcome-screen p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .quote-card {
            background-color: var(--white);
            border-radius: 16px;
            padding: 24px;
            border-left: 4px solid var(--pink-primary);
            box-shadow: var(--shadow);
            margin-top: 16px;
        }

        .quote-card p {
            font-style: italic;
            margin-bottom: 8px;
            color: var(--pink-dark);
        }

        .quote-card span {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Subject Content Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            height: 100%;
        }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--pink-light);
            margin-bottom: 8px;
        }

        .subject-header h2 {
            font-size: 1.8rem;
            color: var(--pink-dark);
            font-weight: 700;
        }

            display: grid;
            grid-template-columns: 1.2fr
